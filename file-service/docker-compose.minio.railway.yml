# MinIO для file-service — отдельный Railway import
# Перетащите на canvas в тот же проект, что mongo и file-service
# file-service: S3_ENDPOINT=http://minio.railway.internal:9000

services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s

  minio-setup:
    image: minio/mc:latest
    restart: 'no'
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio.railway.internal:9000 minioadmin minioadmin;
      /usr/bin/mc mb myminio/files --ignore-existing;
      /usr/bin/mc mb myminio/avatars --ignore-existing;
      exit 0;
      "

volumes:
  minio_data:
